<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | AMPARO</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body.dark-theme {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #1a0000 0%, #000000 100%);
            margin: 0;
            overflow: hidden;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 65, 61, 0.2);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 0 0 20px rgba(255, 65, 61, 0.1);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 2.22rem;
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 8px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Montserrat', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent-attendance);
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
        }

        .auth-btn {
            width: 100%;
            background: var(--primary-red);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Oswald', sans-serif;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            background: var(--primary-red-hover);
            box-shadow: 0 8px 16px var(--primary-red-glow);
        }

        .auth-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--primary-red);
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .flash-messages {
            margin-bottom: 20px;
        }

        .flash {
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 10px;
        }

        .flash.error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .flash.success {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #6ee7b7;
        }
    </style>
</head>

<body class="dark-theme">
    <div class="auth-container">
        <div class="auth-header">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="AMPARO Logo" style="height: 75px; margin-bottom: 10px;">
            <p>Register a new administrator</p>
        </div>

        <div class="flash-messages">
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}
        </div>

        <form method="POST" action="{{ url_for('register_user') }}">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username" autofocus>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="new-password">
            </div>

            <div class="input-group">
                <label for="confirm">Confirm Password</label>
                <input type="password" id="confirm" name="confirm" required autocomplete="new-password">
            </div>

            <button type="submit" class="auth-btn">Initialize Account</button>
        </form>

        <div class="auth-footer">
            Already registered? <a href="{{ url_for('login') }}">Sign In</a>
        </div>
    </div>
</body>

</html>
